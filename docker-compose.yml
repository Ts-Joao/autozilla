services:
  postgres:
    image: postgres:16-alpine
    container_name: autozilla_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: autozilla
      POSTGRES_PASSWORD: autozilla
      POSTGRES_DB: autozilla
    ports:
      - "5432:5432"
    volumes:
      - autozilla_pgdata:/var/lib/postgresql/data

volumes:
  autozilla_pgdata: